services:
  - type: web_service
    name: notes-management-backend
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: YOUR_MONGODB_URI_HERE
      - key: CLIENT_URL
        value: https://notes-management-client.onrender.com

staticSites:
  - name: notes-management-client
    env: static
    plan: starter
    region: oregon
    branch: main
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://notes-management-backend.onrender.com/api
